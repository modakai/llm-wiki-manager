<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Wiki Manager MVP</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="panel settings">
        <h1>LLM Wiki</h1>
        <p class="muted">本地文件工作区 + OpenAI 兼容模型</p>

        <label>
          Base URL
          <input id="baseUrl" placeholder="https://api.deepseek.com/v1" />
        </label>
        <label>
          API Key
          <input id="apiKey" type="password" placeholder="只保存在本机 workspace/.app/config.json" />
        </label>
        <label>
          Model
          <input id="model" placeholder="deepseek-chat" />
        </label>
        <div class="grid-two">
          <label>
            Temperature
            <input id="temperature" type="number" step="0.1" min="0" max="2" />
          </label>
          <label>
            Timeout
            <input id="timeout" type="number" min="1" max="600" />
          </label>
        </div>
        <button id="saveSettings">保存模型配置</button>
        <p id="settingsStatus" class="status"></p>

        <section class="upload-box">
          <h2>上传资料</h2>
          <input id="fileInput" type="file" accept=".pdf,.docx,.doc,.txt,.md" />
          <button id="uploadFile">解析上传文件</button>
          <button id="generateWiki" disabled>生成 Wiki</button>
          <p id="uploadStatus" class="status"></p>
        </section>
      </aside>

      <section class="panel pages">
        <header>
          <h2>Wiki 页面</h2>
          <button id="refreshPages" class="secondary">刷新</button>
        </header>
        <div id="pageList" class="page-list"></div>
      </section>

      <section class="panel preview">
        <header>
          <h2 id="previewTitle">预览</h2>
        </header>
        <pre id="markdownPreview"></pre>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
